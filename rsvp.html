```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Potwierdzenie obecności</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,0,255,.4), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(0,255,255,.4), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(0,255,120,.3), transparent 30%);
    filter:blur(90px);
    animation:psy 12s ease-in-out infinite alternate;
}

@keyframes psy{
    from{
        transform:scale(1) rotate(0deg);
    }
    to{
        transform:scale(1.25) rotate(15deg);
    }
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
    width:90%;
    max-width:500px;
}

h1{
    margin-bottom:15px;
    text-shadow:0 0 15px #fff;
}

.subtitle{
    opacity:.8;
    margin-bottom:35px;
}

.count{
    font-size:72px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 0 20px white;
}

.bar-container{
    width:140px;
    height:400px;
    margin:0 auto 30px;
    border:2px solid rgba(255,255,255,.4);
    border-radius:20px;
    overflow:hidden;
    display:flex;
    align-items:flex-end;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

.bar{
    width:100%;
    height:0%;
    background:
        linear-gradient(
            to top,
            #ff00ff,
            #00ffff
        );
    transition:height .7s ease;
}

button{
    border:none;
    border-radius:16px;
    padding:18px 36px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    background:
        linear-gradient(
            45deg,
            #ff00ff,
            #00ffff
        );
    color:black;
    transition:.25s;
}

button:hover{
    transform:scale(1.05);
}

button:disabled{
    opacity:.6;
    cursor:default;
    transform:none;
}

.info{
    margin-top:20px;
    opacity:.75;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

    <h1>🎉 Potwierdź obecność 🎉</h1>

    <p class="subtitle">
        Kliknij tylko jeśli naprawdę będziesz.
    </p>

    <div class="count" id="count">0</div>

    <div class="bar-container">
        <div class="bar" id="bar"></div>
    </div>

    <button id="confirmBtn" onclick="confirmAttendance()">
        POTWIERDZAM OBECNOŚĆ
    </button>

    <div class="info">
        Aktualna liczba potwierdzonych gości
    </div>

</div>

<script>

const NAMESPACE = "urodziny-marcina-2026";
const KEY = "rsvp";
const STORAGE_KEY = "rsvp_confirmed";

const countElement = document.getElementById("count");
const barElement = document.getElementById("bar");
const buttonElement = document.getElementById("confirmBtn");

async function loadCounter(){

    try{

        const response = await fetch(
            `https://api.countapi.xyz/get/${NAMESPACE}/${KEY}`
        );

        const data = await response.json();

        updateUI(data.value || 0);

    }catch(error){

        console.error(error);

    }

    checkConfirmation();
}

function updateUI(count){

    countElement.textContent = count;

    const expectedGuests = 50;

    const percent =
        Math.min(
            (count / expectedGuests) * 100,
            100
        );

    barElement.style.height = percent + "%";
}

function checkConfirmation(){

    if(localStorage.getItem(STORAGE_KEY)){

        buttonElement.disabled = true;
        buttonElement.textContent =
            "✓ Obecność potwierdzona";

    }
}

async function confirmAttendance(){

    if(localStorage.getItem(STORAGE_KEY)){
        return;
    }

    try{

        const response = await fetch(
            `https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`
        );

        const data = await response.json();

        updateUI(data.value);

        localStorage.setItem(
            STORAGE_KEY,
            "true"
        );

        buttonElement.disabled = true;
        buttonElement.textContent =
            "✓ Obecność potwierdzona";

    }catch(error){

        console.error(error);

        alert(
            "Nie udało się zapisać potwierdzenia."
        );
    }
}

loadCounter();

</script>

</body>
</html>
```
